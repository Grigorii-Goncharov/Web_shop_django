{% extends 'catalog/base.html' %}
{% block title %}Каталог{% endblock %}
{% include "catalog/includes/inc_menu.html" %}

{% block content %}

<div class="card">
    <div class="card-body">
        <h3>Подтверждение удаления</h3>
        <p>Вы действительно хотите удалить товар: <strong>{{ object.name }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'catalog:product' pk=object.pk %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>

{% endblock %}

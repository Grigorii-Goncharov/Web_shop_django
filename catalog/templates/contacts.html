<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Контакты{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
</head>
<body>
{% include "includes/inc_menu.html" %}

<div class="pricing-header px-3 py-3 pt-md-5 pb-md-4 mx-auto text-center">
    <h1 class="display-4">Контакты</h1>
</div>

<div class="container my-4">
    <div class="row">
        <!-- Левая часть — контакты -->
        <div class="col-lg-8 col-md-7 col-sm-12 mb-4">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5>Наши реквизиты</h5>
                    <table class="table table-striped table-borderless">
                        <tr>
                            <td class="w-25 fw-bold">Страна</td>
                            <td>USA</td>
                        </tr>
                        <tr>
                            <td class="w-25 fw-bold">ИНН</td>
                            <td>91-1144442</td>
                        </tr>
                        <tr>
                            <td class="w-25 fw-bold">Адрес</td>
                            <td>Redmond, WA, 98052-6399</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <!-- Правая часть — форма -->
        <div class="col-lg-4 col-md-5 col-sm-12">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h4 class="my-0">Свяжитесь с нами</h4>
                </div>
                <div class="card-body">
                    <!-- Показ сообщения об успехе -->
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-success alert-sm">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="post" action="{% url 'catalog:contacts' %}">
                        {% csrf_token %}

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="name" name="name" placeholder="Ваше имя" required autofocus>
                            <label for="name">Ваше имя</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email" placeholder="email@example.com" required>
                            <label for="email">Email</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="+7 (999) 123-45-67" required>
                            <label for="phone">Телефон</label>
                        </div>

                        <div class="form-floating mb-3">
                            <textarea class="form-control" id="message" name="message" placeholder="Ваше сообщение" style="height: 100px" required></textarea>
                            <label for="message">Сообщение</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg">Отправить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    {% include "includes/inc_footer.html" %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        crossorigin="anonymous"></script>
</body>
</html>

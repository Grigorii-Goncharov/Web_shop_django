<!-- templates/blog/base.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Морской Блог{% endblock %}</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e6f7ff; /* Светло-голубой фон, как море у берега */
            color: #003366;
            font-family: 'Georgia', serif;
        }
        .navbar {
            background-color: #003366 !important; /* Тёмно-синий — как глубокое море */
        }
        .navbar-brand, .nav-link {
            color: #00CED1 !important; /* Бирюзовый для текста */
        }
        .btn-ocean {
            background-color: #003366;
            border-color: #00CED1;
            color: white;
            transition: all 0.3s;
        }
        .btn-ocean:hover {
            background-color: #00CED1;
            color: #003366;
            border-color: #003366;
        }
        .btn-sand {
            background-color: #F5DEB3; /* Песочный */
            color: #003366;
            border: 1px solid #DAA520;
        }
        .btn-sand:hover {
            background-color: #DAA520;
            color: white;
        }
        .card {
            border: 1px solid #00CED1;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 51, 102, 0.1);
        }
        footer {
            color: #003366;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'blog:list' %}">
                🌊 🌴 Тропические страны. Блог путешествий
            </a>
            <div class="ms-auto">
                <a href="{% url 'blog:list' %}" class="btn btn-ocean btn-sm me-2">
                    🐚 Все посты
                </a>
                <a href="{% url 'blog:create' %}" class="btn btn-sand btn-sm">
                    ✏️ Новый пост
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="text-center mt-5">
        <p>🌊 &copy; 2025 — Погружение в мысли, как в глубины океана.</p>
    </footer>

    <!-- Bootstrap JS (опционально, если нужен) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
